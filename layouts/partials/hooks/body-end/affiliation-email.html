{{ with (index site.Data.authors "me") }}
  {{ with .affiliations }}
    <script>
      (function () {
        const affiliations = {{ . | jsonify | safeJS }};

        function findOrgBlocks(title) {
          return Array.from(title.children).filter(function (node) {
            return node.classList && node.classList.contains('mb-2');
          });
        }

        function injectEmails() {
          const titles = document.querySelectorAll('.resume-biography .portrait-title');
          if (!titles.length) return false;

          let changed = false;

          titles.forEach(function (title) {
            const orgBlocks = findOrgBlocks(title);

            affiliations.forEach(function (affiliation, index) {
              if (!affiliation || !affiliation.email) return;

              const block = orgBlocks[index];
              if (!block) return;

              if (block.querySelector('.hb-affiliation-email')) return;

              const email = document.createElement('div');
              email.className = 'hb-affiliation-email';
              email.textContent = affiliation.email;
              email.style.fontSize = '0.95rem';
              email.style.lineHeight = '1.35';
              email.style.color = 'rgb(75 85 99)';
              email.style.marginTop = '0.15rem';

              block.appendChild(email);
              changed = true;
            });
          });

          return changed;
        }

        let attempts = 0;
        const timer = window.setInterval(function () {
          attempts += 1;
          injectEmails();

          if (attempts >= 20) {
            window.clearInterval(timer);
          }
        }, 500);

        window.addEventListener('load', injectEmails);
        document.addEventListener('hbThemeChange', injectEmails);
      })();
    </script>
  {{ end }}
{{ end }}
