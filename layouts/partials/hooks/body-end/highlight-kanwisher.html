<script>
  (function () {
    function highlightKanwisher() {
      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          if (!node.nodeValue || !node.nodeValue.includes('Kanwisher Lab')) return NodeFilter.FILTER_REJECT;
          const parent = node.parentElement;
          if (!parent) return NodeFilter.FILTER_REJECT;
          if (parent.closest('script, style')) return NodeFilter.FILTER_REJECT;
          if (parent.closest('.hb-kanwisher-red')) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });

      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);

      nodes.forEach(function (node) {
        const html = node.nodeValue.replaceAll(
          'Kanwisher Lab',
          '<span class="hb-kanwisher-red" style="color: red;">Kanwisher Lab</span>'
        );
        const wrapper = document.createElement('span');
        wrapper.innerHTML = html;
        node.parentNode.replaceChild(wrapper, node);
      });
    }

    let attempts = 0;
    const timer = window.setInterval(function () {
      attempts += 1;
      highlightKanwisher();
      if (attempts >= 20) window.clearInterval(timer);
    }, 500);

    window.addEventListener('load', highlightKanwisher);
    document.addEventListener('DOMContentLoaded', highlightKanwisher);
  })();
</script>
