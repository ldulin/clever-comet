<script>
  (function () {
    const targets = ['Kanwisher Lab', 'Buckner Lab'];

    function adjustAvatarLayout() {
      if (window.innerWidth < 768) return;

      document.querySelectorAll('.resume-biography').forEach(function (section) {
        section.style.alignItems = 'flex-start';

        const profile = section.querySelector('#profile');
        if (profile) {
          profile.style.position = 'relative';
          profile.style.left = window.innerWidth >= 1024 ? '-64px' : '-40px';
        }

        const avatar = section.querySelector('.avatar-wrapper');
        if (avatar) {
          avatar.style.position = 'relative';
          avatar.style.left = window.innerWidth >= 1024 ? '-48px' : '-28px';
        }

        const title = section.querySelector('.portrait-title');
        if (title) {
          title.style.position = 'relative';
          title.style.left = window.innerWidth >= 1024 ? '-24px' : '-12px';
        }
      });
    }

    function highlightKanwisher() {
      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          if (!node.nodeValue || !targets.some(target => node.nodeValue.includes(target))) return NodeFilter.FILTER_REJECT;
          const parent = node.parentElement;
          if (!parent) return NodeFilter.FILTER_REJECT;
          if (parent.closest('script, style')) return NodeFilter.FILTER_REJECT;
          if (parent.closest('.hb-highlight-red')) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });

      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);

      nodes.forEach(function (node) {
        let html = node.nodeValue;
        targets.forEach(function (target) {
          html = html.replaceAll(
            target,
            '<span class="hb-highlight-red" style="color: red;">' + target + '</span>'
          );
        });
        const wrapper = document.createElement('span');
        wrapper.innerHTML = html;
        node.parentNode.replaceChild(wrapper, node);
      });
    }

    let attempts = 0;
    const timer = window.setInterval(function () {
      attempts += 1;
      adjustAvatarLayout();
      highlightKanwisher();
      if (attempts >= 20) window.clearInterval(timer);
    }, 500);

    window.addEventListener('resize', adjustAvatarLayout);
    window.addEventListener('load', adjustAvatarLayout);
    window.addEventListener('load', highlightKanwisher);
    document.addEventListener('DOMContentLoaded', highlightKanwisher);
  })();
</script>
