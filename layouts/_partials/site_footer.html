<footer class="footer" style="text-align: center; padding: 1.25rem 0 1rem;">
  <div id="globe-container" style="width: 220px; height: 220px; margin: 0 auto;"></div>

  <p>© Lin Du, Department of Psychology, Harvard University | Center for Brain Sciences, Harvard University</p>
</footer>
<script src="https://unpkg.com/three@0.150.0/build/three.min.js"></script>
<script src="https://unpkg.com/three-globe"></script>
<script>
  const globeContainer = document.getElementById("globe-container");

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(globeContainer.clientWidth, globeContainer.clientHeight);
  renderer.setClearColor(0x000000, 0);
  globeContainer.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(
    45,
    globeContainer.clientWidth / globeContainer.clientHeight,
    0.1,
    1000
  );
  camera.position.z = 300;

  const globe = new ThreeGlobe()
    .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg")
    .bumpImageUrl("https://unpkg.com/three-globe/example/img/earth-topology.png");

  scene.add(globe);

  const light = new THREE.AmbientLight(0xffffff, 1.2);
  scene.add(light);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(1, 1, 1);
  scene.add(dirLight);

  function animate() {
    requestAnimationFrame(animate);
    globe.rotation.y += 0.002;
    renderer.render(scene, camera);
  }
  animate();
</script>
